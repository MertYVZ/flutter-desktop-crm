name: gen
description: "A new Flutter package project."
version: 0.0.1
homepage:

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter


  # Core
  equatable: ^2.0.7

  # Config
  json_annotation: ^4.9.0
  envied: ^1.2.0
  flutter_gen: ^5.11.0


  # Utils
  flutter_svg: ^2.2.1
  lottie: ^3.3.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^8.0.0
  build_runner: ^2.4.8
  envied_generator: ^1.1.0
  json_serializable: ^6.7.0
  flutter_gen_runner: ^5.11.0

flutter_gen:
  output: lib/src/asset/
  integrations:
    lottie: true
    flutter_svg: true


  colors:
    inputs:
      - assets/colors/colors.xml


flutter:

  
  assets:
    - assets/colors/
    - assets/lottie/
    - assets/images/
    - assets/icons/

  